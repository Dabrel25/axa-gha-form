    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }

    .meta-item svg { width: 16px; height: 16px; stroke: #00008B; flex-shrink: 0; }
    .btn { display: block; width: 100%; background: #00008B; color: #fff; text-align: center; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 500; text-decoration: none; letter-spacing: 0.01em; transition: background 0.15s ease; }
